body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
h1,h2,h3{font-family:'Playfair Display',serif}
#app{display:flex;min-height:100vh}
#sidebar{width:240px;min-height:100vh;background:var(--ink);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
#main{flex:1;overflow-x:hidden;overflow-y:auto;height:100vh}

.sb-sub{font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:0.5px;text-transform:uppercase;margin-top:2px}

.sb-streak-num{font-weight:600;color:#fbbf24;font-size:14px}
.sb-nav{padding:12px 0;flex:1}
.sb-section{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1px;text-transform:uppercase;padding:12px 20px 6px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;transition:background 0.15s;color:rgba(255,255,255,0.65);font-size:13.5px}

.sb-username{font-size:13px;color:rgba(255,255,255,0.8)}
.sb-role{font-size:11px;color:rgba(255,255,255,0.35)}
.sb-switch{margin-left:auto;font-size:11px;color:var(--accent2);cursor:pointer;background:rgba(91,76,245,0.2);border:none;padding:3px 8px;border-radius:5px;color:#c4baff}

.tb-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:20px;font-weight:500}
.tb-badge.xp{background:var(--accent-soft);color:var(--accent)}

.card-sm{padding:14px 16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

.btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent)}

.btn-danger{background:var(--red-soft);color:var(--red);border:1px solid var(--red)}

.achievement-name{font-size:12px;font-weight:500}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}

// ═══════════════════════════════════════════
// SYNC HELPERS
// ═══════════════════════════════════════════
function setSyncStatus(status) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if (!dot || !txt) return;
  dot.className = 'sync-dot' + (status === 'syncing' ? ' syncing' : status === 'error' ? ' error' : '');
  txt.textContent = status === 'syncing' ? 'Syncing...' : status === 'error' ? 'Sync error' : 'Synced';
}

async function sbGet(table, match) {
  let q = sb.from(table).select('*').eq('student_id', STUDENT_ID);
  if (match) Object.entries(match).forEach(([k, v]) => { q = q.eq(k, v); });
  const { data, error } = await q;
  if (error) { console.error(table, error); return []; }
  return data || [];
}

async function sbUpsert(table, row) {
  setSyncStatus('syncing');
  const { error } = await sb.from(table).upsert({ student_id: STUDENT_ID, ...row }, { onConflict: 'student_id' });
  setSyncStatus(error ? 'error' : 'synced');
  if (error) console.error('upsert', table, error);
}

async function sbInsert(table, row) {
  setSyncStatus('syncing');
  const { error } = await sb.from(table).insert({ student_id: STUDENT_ID, ...row });
  setSyncStatus(error ? 'error' : 'synced');
  if (error) console.error('insert', table, error);
}

async function sbUpsertUnique(table, conflictCol, row) {
  setSyncStatus('syncing');
  const { error } = await sb.from(table).upsert({ student_id: STUDENT_ID, ...row }, { onConflict: conflictCol });
  setSyncStatus(error ? 'error' : 'synced');
  if (error) console.error('upsert-unique', table, error);
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let state = {
  role: 'student', page: 'dashboard',
  selectedSubject: null, selectedUnit: null,
  xp: 0, streak: 0, lastLogin: null,
  completedTopics: {}, completedResources: {},
  quizHistory: [], achievements: [],
  questionBank: {}, activeQuiz: null,
  spaceRepeat: {}, loaded: false
};

// ═══════════════════════════════════════════
// LOAD FROM SUPABASE
// ═══════════════════════════════════════════
async function loadFromSupabase() {
  setSyncStatus('syncing');
  try {
    const [stats, progress, resources, quizzes, qbank, spaced] = await Promise.all([
      sbGet('ng_stats'),
      sbGet('ng_progress'),
      sbGet('ng_resources'),
      sbGet('ng_quiz_history'),
      sbGet('ng_question_bank'),
      sbGet('ng_spaced_review')
    ]);

    // Stats
    if (stats.length) {
      const s = stats[0];
      state.xp = s.xp || 0;
      state.streak = s.streak || 0;
      state.lastLogin = s.last_login;
      state.achievements = s.achievements || [];
    }

    // Progress
    state.completedTopics = {};
    progress.forEach(p => { state.completedTopics[p.topic_key] = p.completed; });

    // Resources
    state.completedResources = {};
    resources.forEach(r => { state.completedResources[r.resource_key] = r.reviewed; });

    // Quiz history
    state.quizHistory = quizzes.map(q => ({
      sid: q.subject_id, topic: q.topic,
      correct: q.correct, total: q.total,
      pct: q.pct, date: q.quiz_date, ts: new Date(q.created_at).getTime()
    })).sort((a, b) => a.ts - b.ts);

    // Question bank
    state.questionBank = {};
    qbank.forEach(q => {
      if (!state.questionBank[q.subject_id]) state.questionBank[q.subject_id] = [];
      state.questionBank[q.subject_id].push({
        q: q.question, opts: q.options,
        ans: q.correct_index, exp: q.explanation,
        _topic: q.topic, _generated: q.generated
      });
    });

    // Spaced review
    state.spaceRepeat = {};
    spaced.filter(s => !s.dismissed).forEach(s => {
      const key = s.id;
      state.spaceRepeat[key] = {
        id: s.id, sid: s.subject_id, topic: s.topic,
        ques: s.question_data, due: new Date(s.due_at).getTime()
      };
    });

    state.loaded = true;
    updateStreak();
    setSyncStatus('synced');
  } catch (e) {
    console.error('Load error', e);
    setSyncStatus('error');
    // Fall back to localStorage
    const ls = localStorage.getItem('ng_portal_v3');
    if (ls) try { Object.assign(state, JSON.parse(ls)); } catch(e2) {}
    state.loaded = true;
    updateStreak();
  }
  renderSidebar();
  renderPage();
}

function saveLocal() {
  localStorage.setItem('ng_portal_v3', JSON.stringify({
    role: state.role, xp: state.xp, streak: state.streak,
    lastLogin: state.lastLogin, completedTopics: state.completedTopics,
    completedResources: state.completedResources, quizHistory: state.quizHistory,
    achievements: state.achievements, questionBank: state.questionBank,
    spaceRepeat: state.spaceRepeat
  }));
}

async function saveStats() {
  saveLocal();
  await sbUpsert('ng_stats', {
    xp: state.xp, streak: state.streak,
    last_login: state.lastLogin,
    achievements: state.achievements,
    updated_at: new Date().toISOString()
  });
}

function updateStreak() {
  const today = new Date().toISOString().split('T')[0];
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  if (state.lastLogin === today) return;
  if (state.lastLogin === yesterday) state.streak++;
  else if (!state.lastLogin) state.streak = 1;
  else state.streak = 1;
  state.lastLogin = today;
  saveStats();
}

function renderSidebar() {
  const nav = state.role === 'admin' ? NAV_ADMIN : NAV_STUDENT;
  let html = '';
  nav.forEach(item => {
    if (item.section) html += `<div class="sb-section">${item.section}</div>`;
    else html += `<div class="sb-item ${state.page===item.id?'active':''}" onclick="navigate('${item.id}')">`
      + `<span class="sb-item-icon">${item.icon}</span>${item.label}</div>`;
  });
  document.getElementById('sidebarNav').innerHTML = html;
  document.getElementById('streakNum').textContent = state.streak + ' days';
  document.getElementById('xpBadge').textContent = '⭐ ' + state.xp + ' XP';
  document.getElementById('streakBadge').textContent = '🔥 ' + state.streak + 'd streak';
  document.getElementById('sidebarName').textContent = state.role === 'admin' ? 'Parent/Admin' : 'Nandini';
  document.getElementById('sidebarRole').textContent = state.role === 'admin' ? 'Administrator' : 'Grade 9 Student';
  document.getElementById('roleBtn').textContent = state.role === 'admin' ? 'Student' : 'Admin';
  document.getElementById('avatarInitials').textContent = state.role === 'admin' ? 'AD' : 'NG';
}

function switchRole() {
  state.role = state.role === 'admin' ? 'student' : 'admin';
  state.page = 'dashboard';
  renderSidebar(); renderPage();
}

function navigate(page) {
  state.page = page; state.selectedSubject = null; state.selectedUnit = null;
  renderSidebar(); renderPage();
  document.getElementById('main').scrollTop = 0;
}

function renderPage() {
  if (!state.loaded) {
    document.getElementById('content').innerHTML = '<div style="text-align:center;padding:60px"><div class="spinner"></div><p class="text-muted mt-16">Loading from Supabase...</p></div>';
    return;
  }
  const titles = {dashboard:'Dashboard',subjects:'Subjects & Curriculum',resources:'Resources',
    worksheets:'Worksheets',generate:'Generate Quiz',spaced:'Spaced Review',
    progress:'My Progress',history:'Quiz History',achievements:'Achievements',settings:'Settings'};
  document.getElementById('topbarTitle').textContent = titles[state.page] || 'Study Portal';
  const c = document.getElementById('content');
  const pages = {
    dashboard: renderDashboard, subjects: renderSubjects, resources: renderResources,
    worksheets: renderWorksheets, generate: renderGenerate, spaced: renderSpaced,
    progress: renderProgress, history: renderHistory, achievements: renderAchievements,
    settings: renderSettings
  };
  c.innerHTML = (pages[state.page] || renderDashboard)();
}

async function generateAIQuiz() {
  const subId = document.getElementById('genSubject').value;
  const topic = document.getElementById('genTopic').value || 'general topics';
  const diff = document.getElementById('genDiff').value;
  const count = parseInt(document.getElementById('genCount').value);
  const sub = SUBJECTS.find(s=>s.id===subId);
  const statusEl = document.getElementById('genStatus');

  statusEl.innerHTML = `<div class="card" style="text-align:center;padding:28px">
    <div class="spinner"></div>
    <p style="color:var(--muted);margin-top:8px;font-size:14px">Generating ${count} ${diff} questions on "${topic}" for ${sub.name}...</p>
  </div>`;

  const prompt = `You are a Texas TEKS Grade 9 teacher. Create exactly ${count} multiple-choice questions about "${topic}" for ${sub.name} (${sub.teks}).
Difficulty: ${diff === 'easy' ? 'foundational recall' : diff === 'medium' ? 'standard Grade 9 application' : 'STAAR-level critical thinking'}.
Respond ONLY with a valid JSON array, no markdown, no extra text:
[{"q":"question","opts":["A","B","C","D"],"ans":0,"exp":"explanation"}]
ans is the 0-based index of the correct answer. Make all options plausible.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }] })
    });
    const data = await resp.json();
    let text = data.content.map(c=>c.text||'').join('');
    text = text.replace(/```json|```/g,'').trim();
    const questions = JSON.parse(text);

    // Save to question bank in Supabase
    for (const q of questions) {
      await sbInsert('ng_question_bank', {
        subject_id: subId, topic, question: q.q, options: q.opts,
        correct_index: q.ans, explanation: q.exp, difficulty: diff, generated: true
      });
      if (!state.questionBank[subId]) state.questionBank[subId] = [];
      state.questionBank[subId].push({ ...q, _topic: topic, _generated: true });
    }
    saveLocal();

    statusEl.innerHTML = `<div class="card" style="border-color:var(--green)">
      <p style="color:var(--green);font-weight:500;margin-bottom:12px">✓ Generated ${questions.length} questions and saved to your bank!</p>
      <button class="btn btn-primary" onclick="startCustomQuiz('${subId}',${count})">📝 Start This Quiz Now</button>
      <button class="btn btn-outline mt-8" onclick="navigate('worksheets')">View all worksheets</button>
    </div>`;
    window._lastGenQuestions = questions;
    window._lastGenSid = subId;
  } catch(e) {
    statusEl.innerHTML = `<div class="card" style="border-color:var(--red)">
      <p style="color:var(--red);font-size:14px">⚠️ Generation failed: ${e.message}</p>
      <p style="font-size:12px;color:var(--muted);margin-top:8px">The Anthropic API requires a valid API key with billing set up. This portal is using a proxy-free direct call.</p>
    </div>`;
  }
}

// ═══════════════════════════════════════════
function startSubjectQuiz(sid) {
  const base = BASE_QUESTIONS[sid] || [];
  const extra = state.questionBank[sid] || [];
  const all = [...base, ...extra];
  if (!all.length) { alert('No questions yet! Generate some first.'); return; }
  const questions = shuffle(all).slice(0, Math.min(5, all.length));
  openQuiz(sid, SUBJECTS.find(s=>s.id===sid)?.name || sid, questions);
}

function startCustomQuiz(sid, count) {
  const qs = window._lastGenQuestions || [];
  openQuiz(sid, SUBJECTS.find(s=>s.id===sid)?.name || sid, qs.slice(0, count));
}

function openQuiz(sid, topic, questions) {
  state.activeQuiz = { sid, topic, questions, current: 0, answers: {} };
  showModal('Quiz: ' + topic, renderQuizQuestion());
}

function renderQuizQuestion() {
  const q = state.activeQuiz;
  if (!q) return '';
  const qi = q.current;
  const ques = q.questions[qi];
  const total = q.questions.length;
  const answered = q.answers[qi];
  return `<div>
    <div class="flex items-center justify-between mb-16">
      <span class="badge badge-accent">Question ${qi+1} of ${total}</span>
      <div class="prog-bar" style="width:120px"><div class="prog-fill" style="width:${Math.round((qi+1)/total*100)}%"></div></div>
    </div>
    <p class="quiz-q">${ques.q}</p>
    ${ques.opts.map((opt,i)=>{
      let cls='quiz-opt';
      if(answered!==undefined){
        if(i===ques.ans) cls+=' correct';
        else if(i===answered&&answered!==ques.ans) cls+=' wrong';
      } else if(i===answered) cls+=' selected';
      return `<div class="${cls}" onclick="${answered===undefined?`selectAnswer(${i})`:''}">
        <div class="quiz-letter">${['A','B','C','D'][i]}</div><span>${opt}</span></div>`;
    }).join('')}
    ${answered!==undefined?`<div class="card mt-12" style="background:var(--surface2);border:none">
      <p style="font-size:13px"><strong>${answered===ques.ans?'✓ Correct!':'✗ Incorrect.'}</strong> ${ques.exp}</p>
    </div>`:''}
    <div class="flex mt-16" style="justify-content:flex-end;gap:8px">
      ${answered!==undefined&&qi<total-1?`<button class="btn btn-primary" onclick="nextQuestion()">Next →</button>`:''}
      ${answered!==undefined&&qi===total-1?`<button class="btn btn-primary" onclick="finishQuiz()">See Results →</button>`:''}
    </div>
  </div>`;
}

function selectAnswer(i) {
  if (!state.activeQuiz || state.activeQuiz.answers[state.activeQuiz.current] !== undefined) return;
  state.activeQuiz.answers[state.activeQuiz.current] = i;
  document.getElementById('modalBody').innerHTML = renderQuizQuestion();
}

function nextQuestion() { state.activeQuiz.current++; document.getElementById('modalBody').innerHTML = renderQuizQuestion(); }

async function finishQuiz() {
  const q = state.activeQuiz;
  const correct = Object.keys(q.answers).filter(i=>q.answers[i]===q.questions[i].ans).length;
  const total = q.questions.length;
  const pct = Math.round(correct/total*100);
  const xpGain = pct>=80?30:pct>=60?20:10;

  const entry = { sid:q.sid, topic:q.topic, correct, total, pct,
    date: new Date().toLocaleDateString(), ts: Date.now() };
  state.quizHistory.push(entry);
  awardXP(xpGain);

  // Spaced repetition -- schedule wrong answers
  for (const [i, ques] of q.questions.entries()) {
    if (q.answers[i] !== ques.ans) {
      const dueAt = new Date(Date.now() + 86400000 * 2).toISOString();
      const { data } = await sb.from('ng_spaced_review').insert({
        student_id: STUDENT_ID, subject_id: q.sid, topic: q.topic,
        question_data: ques, due_at: dueAt
      }).select();
      if (data?.[0]) {
        state.spaceRepeat[data[0].id] = {
          id: data[0].id, sid: q.sid, topic: q.topic, ques, due: new Date(dueAt).getTime()
        };
      }
    }
  }

  // Save quiz to Supabase
  await sbInsert('ng_quiz_history', {
    subject_id: q.sid, topic: q.topic, correct, total, pct,
    quiz_date: new Date().toISOString().split('T')[0]
  });
  checkAchievements();
  await saveStats();
  saveLocal();

  const color = pct>=80?'var(--green)':pct>=60?'var(--amber)':'var(--red)';
  const msg = pct>=80?'Excellent work! 🎉':pct>=60?'Good effort! Keep practicing 💪':'Keep reviewing -- you\'ve got this! 📚';

  document.getElementById('modalBody').innerHTML = `
    <div style="text-align:center;padding:20px 0">
      <div class="score-ring" style="border-color:${color}">
        <div class="score-pct" style="color:${color}">${pct}%</div>
        <div style="font-size:11px;color:var(--muted)">${correct}/${total}</div>
      </div>
      <h3 style="font-size:18px;margin-bottom:6px">${msg}</h3>
      <p class="text-muted text-sm">+${xpGain} XP  -  Saved to Supabase ☁️</p>
      <div class="flex mt-20" style="justify-content:center;gap:10px">
        <button class="btn btn-outline" onclick="closeModal();renderPage()">Close</button>
        <button class="btn btn-primary" onclick="closeModal();navigate('generate')">✨ Generate more</button>
      </div>
    </div>
    <div style="margin-top:20px">
      <h3 style="font-size:14px;font-weight:600;margin-bottom:12px">Answer Review</h3>
      ${q.questions.map((ques,i)=>`
        <div style="padding:12px;border-left:3px solid ${q.answers[i]===ques.ans?'var(--green)':'var(--red)'};
          background:${q.answers[i]===ques.ans?'var(--green-soft)':'var(--red-soft)'};border-radius:0 8px 8px 0;margin-bottom:8px">
          <p style="font-size:13px;font-weight:500">${ques.q}</p>
          <p style="font-size:12px;color:var(--muted);margin-top:4px">Your answer: ${ques.opts[q.answers[i]]||'--'} ${q.answers[i]===ques.ans?'✓':'✗'}</p>
          ${q.answers[i]!==ques.ans?`<p style="font-size:12px;color:var(--green);margin-top:2px">Correct: ${ques.opts[ques.ans]}</p>`:''}
          <p style="font-size:12px;color:#555;margin-top:4px">${ques.exp}</p>
        </div>`).join('')}
    </div>`;
}

// SPACED REPETITION

function getSpacedDue() {
  const now = Date.now();
  return Object.values(state.spaceRepeat).filter(s=>s.due<=now);
}

function renderSpaced() {
  const due = getSpacedDue();
  return `<div style="max-width:700px">
    <h1 class="section-title">Spaced Review</h1>
    <p class="section-sub">Questions from past quizzes scheduled for memory reinforcement</p>
    ${due.length===0?`<div class="card" style="text-align:center;padding:40px">
      <p style="font-size:36px;margin-bottom:10px">🎯</p>
      <h3 style="font-size:18px;margin-bottom:6px">All caught up!</h3>
      <p class="text-muted">No reviews due. Keep taking quizzes to build your review queue.</p>
    </div>`:
    `<div class="card mb-16">
      <p style="font-size:14px;margin-bottom:14px">You have <strong>${due.length} question${due.length>1?'s':''}</strong> due for review.</p>
      <button class="btn btn-primary" onclick="startSpacedSession()">🔄 Start Review Session</button>
    </div>
    ${due.map(d=>`<div class="card card-sm mb-8">
      <span class="badge badge-amber mb-8">Review due</span>
      <p style="font-size:14px">${d.ques.q}</p>

}

async function startSpacedSession() {
  const due = getSpacedDue();
  if (!due.length) return;
  // Dismiss them in Supabase after session
  openQuiz(due[0].sid, 'Spaced Review', due.map(d=>d.ques));
}

  {id:'perfect_score',icon:'💯',name:'Perfect Score',desc:'Score 100% on a quiz',check:()=>state.quizHistory.some(q=>q.pct===100)},

  {id:'streak_7',icon:'⚡',name:'Streak Master',desc:'7-day study streak',check:()=>state.streak>=7},

  {id:'quiz_10',icon:'📝',name:'Quiz Warrior',desc:'Take 10 quizzes',check:()=>state.quizHistory.length>=10},

  {id:'all_subjects',icon:'🌟',name:'All-Rounder',desc:'Take a quiz in every subject',check:()=>SUBJECTS.every(s=>state.quizHistory.some(q=>q.sid===s.id))},
  {id:'curriculum_complete',icon:'🎓',name:'Curriculum Complete',desc:'Complete all topics',check:()=>Object.values(state.completedTopics).filter(Boolean).length>=SUBJECTS.reduce((a,s)=>a+s.units.reduce((b,u)=>b+u.topics.length,0),0)}
];

function checkAchievements() {
  let newEarned = false;
  ALL_ACHIEVEMENTS.forEach(a=>{
    if(!state.achievements.includes(a.id)&&a.check()){
      state.achievements.push(a.id); awardXP(50); newEarned = true;
    }
  });
  return newEarned;
}

function renderAchievements() {
  return `<div style="max-width:800px">
    <h1 class="section-title">Achievements</h1>
    <p class="section-sub">${state.achievements.length}/${ALL_ACHIEVEMENTS.length} earned</p>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px">
    ${ALL_ACHIEVEMENTS.map(a=>{
      const earned=state.achievements.includes(a.id);
      return `<div class="achievement ${earned?'earned':''}" style="${!earned?'opacity:0.4':''}">
        <div class="achievement-icon">${earned?a.icon:'🔒'}</div>
        <div class="achievement-name">${a.name}</div>
        <div class="achievement-desc">${a.desc}</div>
        ${earned?'<span class="badge badge-green" style="font-size:10px">Earned ✓</span>':''}
      </div>`;
    }).join('')}
    </div>
  </div>`;
}

// ═══════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════
function showModal(title, body) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalOverlay').style.display = 'flex';
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').style.display = 'none';
  state.activeQuiz = null;
}

// ═══════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════
function awardXP(amount) { state.xp += amount; renderSidebar(); }
function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
