<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Nandini's Study Portal</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --ink: #1a1a2e; --ink2: #2d2d4a; --muted: #6b6b8a; --soft: #9898b0;
  --border: rgba(100,100,160,0.15); --border2: rgba(100,100,160,0.28);
  --bg: #f7f6ff; --surface: #ffffff; --surface2: #f0effe;
  --accent: #5b4cf5; --accent2: #7c6ff7; --accent-soft: #ede9ff;
  --green: #16a34a; --green-soft: #dcfce7;
  --amber: #d97706; --amber-soft: #fef3c7;
  --red: #dc2626; --red-soft: #fee2e2;
  --blue: #2563eb; --blue-soft: #dbeafe;
  --teal: #0d9488; --teal-soft: #ccfbf1;
  --r: 10px; --r2: 16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
h1,h2,h3{font-family:'Playfair Display',serif}
#app{display:flex;min-height:100vh}
#sidebar{width:240px;min-height:100vh;background:var(--ink);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
#main{flex:1;overflow-x:hidden;overflow-y:auto;height:100vh}

.sb-logo{font-family:'Playfair Display',serif;font-size:18px;color:#fff;font-weight:700;line-height:1.2}
.sb-sub{font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:0.5px;text-transform:uppercase;margin-top:2px}
.sb-streak{display:flex;align-items:center;gap:6px;margin-top:12px;background:rgba(255,255,255,0.06);border-radius:8px;padding:8px 10px}
.sb-streak-num{font-weight:600;color:#fbbf24;font-size:14px}
.sb-nav{padding:12px 0;flex:1}
.sb-section{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1px;text-transform:uppercase;padding:12px 20px 6px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;transition:background 0.15s;color:rgba(255,255,255,0.65);font-size:13.5px}
.sb-item:hover{background:rgba(255,255,255,0.07);color:#fff}
.sb-item.active{background:rgba(91,76,245,0.3);color:#c4baff}
.sb-item-icon{width:18px;text-align:center;font-size:16px}
.sb-footer{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.08)}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff}
.sb-username{font-size:13px;color:rgba(255,255,255,0.8)}
.sb-role{font-size:11px;color:rgba(255,255,255,0.35)}
.sb-switch{margin-left:auto;font-size:11px;color:var(--accent2);cursor:pointer;background:rgba(91,76,245,0.2);border:none;padding:3px 8px;border-radius:5px;color:#c4baff}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;height:60px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.tb-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;flex:1}
.tb-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:4px 10px;border-radius:20px;font-weight:500}
.tb-badge.xp{background:var(--accent-soft);color:var(--accent)}
.tb-badge.streak{background:var(--amber-soft);color:var(--amber)}
.tb-sync{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}

#content{padding:28px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px}
.card-sm{padding:14px 16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stat{background:var(--surface2);border-radius:var(--r);padding:16px;text-align:center}
.stat-val{font-size:28px;font-weight:700;font-family:'Playfair Display',serif;color:var(--accent)}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:4px}
.section-title{font-size:20px;font-weight:700;margin-bottom:4px;color:var(--ink)}

.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}

.badge-amber{background:var(--amber-soft);color:var(--amber)}

.badge-accent{background:var(--accent-soft);color:var(--accent)}

.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-outline{background:transparent;color:var(--accent);border:1px solid var(--accent)}

.btn-danger{background:var(--red-soft);color:var(--red);border:1px solid var(--red)}
.prog-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:3px;transition:width 0.4s}
.prog-fill-green{background:var(--green)}
.prog-fill-amber{background:var(--amber)}
.subject-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:18px;cursor:pointer;transition:all 0.15s}
.subject-card:hover{border-color:var(--accent2);box-shadow:0 4px 20px rgba(91,76,245,0.08)}
.topic-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;cursor:pointer;transition:background 0.12s;border:1px solid transparent}

.topic-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}

.resource-check.done{background:var(--green-soft);color:var(--green)}
.resource-check.pending{background:var(--surface2);color:var(--muted)}
.quiz-q{font-size:16px;font-weight:500;margin-bottom:16px;line-height:1.6}
.quiz-opt{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border:1.5px solid var(--border);border-radius:8px;margin-bottom:8px;cursor:pointer;transition:all 0.12s;font-size:14px}

.quiz-opt.correct{border-color:var(--green);background:var(--green-soft)}
.quiz-opt.wrong{border-color:var(--red);background:var(--red-soft)}
.quiz-letter{width:24px;height:24px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;margin-top:1px}
.score-ring{width:100px;height:100px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:6px solid;margin:0 auto 16px;flex-direction:column}
.score-pct{font-size:28px;font-weight:700;font-family:'Playfair Display',serif}
.log-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.log-row:last-child{border-bottom:none}
.achievement{display:flex;flex-direction:column;align-items:center;gap:6px;padding:16px 10px;border:1px solid var(--border);border-radius:var(--r2);text-align:center}
.achievement.earned .achievement-icon{background:var(--accent-soft)}
.achievement-icon{font-size:32px;width:56px;height:56px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center}
.achievement-name{font-size:12px;font-weight:500}
.achievement-desc{font-size:11px;color:var(--muted)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border-radius:var(--r2);width:100%;max-width:640px;max-height:90vh;overflow-y:auto;padding:28px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}

.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:20px auto}

.tab-bar{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab{padding:9px 16px;font-size:13.5px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.12s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500}
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-20{margin-top:20px}
.mb-4{margin-bottom:4px}.mb-8{margin-bottom:8px}.mb-12{margin-bottom:12px}.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}
.flex{display:flex}.items-center{align-items:center}.justify-between{justify-content:space-between}.gap-8{gap:8px}.gap-12{gap:12px}.flex-1{flex:1}
.text-sm{font-size:13px}.text-muted{color:var(--muted)}.text-green{color:var(--green)}.text-accent{color:var(--accent)}
select{font-family:'DM Sans',sans-serif}

/* Login screen */
#loginScreen{position:fixed;inset:0;background:var(--ink);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:0}
.login-box{background:var(--surface);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.login-logo{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--ink);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.login-label{font-size:13px;font-weight:500;display:block;margin-bottom:6px;color:var(--ink)}
.login-input{width:100%;padding:10px 14px;border:1.5px solid var(--border2);border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;color:var(--ink);background:var(--surface);outline:none;margin-bottom:16px;transition:border-color 0.15s}
.login-input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background 0.15s;margin-top:4px}
.login-btn:hover{background:var(--accent2)}
.login-error{font-size:13px;color:var(--red);background:var(--red-soft);padding:8px 12px;border-radius:6px;margin-bottom:14px;display:none}
.login-welcome{font-size:13px;color:var(--muted);text-align:center;margin-top:16px}
</style>

<script>

// =======================================
// LOGIN
// =======================================
const USERS = { 'nandini': '0707dogs!!' };

function checkLogin() {
  if (sessionStorage.getItem('ng_auth') === '1') {
    document.getElementById('loginScreen').style.display = 'none';
  }
}

function doLogin() {
  const user = document.getElementById('loginUser').value.trim().toLowerCase();
  const pass = document.getElementById('loginPass').value;
  const err  = document.getElementById('loginError');
  if (USERS[user] && USERS[user] === pass) {
    sessionStorage.setItem('ng_auth', '1');
    document.getElementById('loginScreen').style.display = 'none';
  } else {
    err.style.display = 'block';
    document.getElementById('loginPass').value = '';
    document.getElementById('loginPass').focus();
  }
}

document.addEventListener('DOMContentLoaded', function() {
  checkLogin();
  document.addEventListener('keydown', function(e) {
    var ls = document.getElementById('loginScreen');
    if (e.key === 'Enter' && ls && ls.style.display !== 'none') doLogin();
  });
});

// ═══════════════════════════════════════════
// SUPABASE CONFIG
// ═══════════════════════════════════════════
const SUPABASE_URL = 'https://mhyavhkgsrkfklirjvhg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1oeWF2aGtnc3JrZmtsaXJqdmhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyNTIzNTcsImV4cCI6MjA5NTgyODM1N30.KH94v9dY0hh2cHhcEOUjcpWizZBkqsd1V8OZRznfFAw';
const STUDENT_ID = 'nandini';

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ═══════════════════════════════════════════
// SYNC HELPERS
// ═══════════════════════════════════════════
function setSyncStatus(status) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  if (!dot || !txt) return;
  dot.className = 'sync-dot' + (status === 'syncing' ? ' syncing' : status === 'error' ? ' error' : '');
  txt.textContent = status === 'syncing' ? 'Syncing...' : status === 'error' ? 'Sync error' : 'Synced';
}

async function sbGet(table, match) {
  let q = sb.from(table).select('*').eq('student_id', STUDENT_ID);
  if (match) Object.entries(match).forEach(([k, v]) => { q = q.eq(k, v); });
  const { data, error } = await q;
  if (error) { console.error(table, error); return []; }
  return data || [];
}

async function sbUpsert(table, row) {
  setSyncStatus('syncing');
  const { error } = await sb.from(table).upsert({ student_id: STUDENT_ID, ...row }, { onConflict: 'student_id' });
  setSyncStatus(error ? 'error' : 'synced');
  if (error) console.error('upsert', table, error);
}

async function sbInsert(table, row) {
  setSyncStatus('syncing');
  const { error } = await sb.from(table).insert({ student_id: STUDENT_ID, ...row });
  setSyncStatus(error ? 'error' : 'synced');
  if (error) console.error('insert', table, error);
}

async function sbUpsertUnique(table, conflictCol, row) {
  setSyncStatus('syncing');
  const { error } = await sb.from(table).upsert({ student_id: STUDENT_ID, ...row }, { onConflict: conflictCol });
  setSyncStatus(error ? 'error' : 'synced');
  if (error) console.error('upsert-unique', table, error);
}

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let state = {
  role: 'student', page: 'dashboard',
  selectedSubject: null, selectedUnit: null,
  xp: 0, streak: 0, lastLogin: null,
  completedTopics: {}, completedResources: {},
  quizHistory: [], achievements: [],
  questionBank: {}, activeQuiz: null,
  spaceRepeat: {}, loaded: false
};

// ═══════════════════════════════════════════
// LOAD FROM SUPABASE
// ═══════════════════════════════════════════
async function loadFromSupabase() {
  setSyncStatus('syncing');
  try {
    const [stats, progress, resources, quizzes, qbank, spaced] = await Promise.all([
      sbGet('ng_stats'),
      sbGet('ng_progress'),
      sbGet('ng_resources'),
      sbGet('ng_quiz_history'),
      sbGet('ng_question_bank'),
      sbGet('ng_spaced_review')
    ]);

    // Stats
    if (stats.length) {
      const s = stats[0];
      state.xp = s.xp || 0;
      state.streak = s.streak || 0;
      state.lastLogin = s.last_login;
      state.achievements = s.achievements || [];
    }

    // Progress
    state.completedTopics = {};
    progress.forEach(p => { state.completedTopics[p.topic_key] = p.completed; });

    // Resources
    state.completedResources = {};
    resources.forEach(r => { state.completedResources[r.resource_key] = r.reviewed; });

    // Quiz history
    state.quizHistory = quizzes.map(q => ({
      sid: q.subject_id, topic: q.topic,
      correct: q.correct, total: q.total,
      pct: q.pct, date: q.quiz_date, ts: new Date(q.created_at).getTime()
    })).sort((a, b) => a.ts - b.ts);

    // Question bank
    state.questionBank = {};
    qbank.forEach(q => {
      if (!state.questionBank[q.subject_id]) state.questionBank[q.subject_id] = [];
      state.questionBank[q.subject_id].push({
        q: q.question, opts: q.options,
        ans: q.correct_index, exp: q.explanation,
        _topic: q.topic, _generated: q.generated
      });
    });

    // Spaced review
    state.spaceRepeat = {};
    spaced.filter(s => !s.dismissed).forEach(s => {
      const key = s.id;
      state.spaceRepeat[key] = {
        id: s.id, sid: s.subject_id, topic: s.topic,
        ques: s.question_data, due: new Date(s.due_at).getTime()
      };
    });

    state.loaded = true;
    updateStreak();
    setSyncStatus('synced');
  } catch (e) {
    console.error('Load error', e);
    setSyncStatus('error');
    // Fall back to localStorage
    const ls = localStorage.getItem('ng_portal_v3');
    if (ls) try { Object.assign(state, JSON.parse(ls)); } catch(e2) {}
    state.loaded = true;
    updateStreak();
  }
  renderSidebar();
  renderPage();
}

function saveLocal() {
  localStorage.setItem('ng_portal_v3', JSON.stringify({
    role: state.role, xp: state.xp, streak: state.streak,
    lastLogin: state.lastLogin, completedTopics: state.completedTopics,
    completedResources: state.completedResources, quizHistory: state.quizHistory,
    achievements: state.achievements, questionBank: state.questionBank,
    spaceRepeat: state.spaceRepeat
  }));
}

async function saveStats() {
  saveLocal();
  await sbUpsert('ng_stats', {
    xp: state.xp, streak: state.streak,
    last_login: state.lastLogin,
    achievements: state.achievements,
    updated_at: new Date().toISOString()
  });
}

function updateStreak() {
  const today = new Date().toISOString().split('T')[0];
  const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
  if (state.lastLogin === today) return;
  if (state.lastLogin === yesterday) state.streak++;
  else if (!state.lastLogin) state.streak = 1;
  else state.streak = 1;
  state.lastLogin = today;
  saveStats();
}

// ═══════════════════════════════════════════
// CURRICULUM DATA -- Texas TEKS Grade 9
// ═══════════════════════════════════════════
const ALL_SUBJECTS = [
  {
    id:'english', name:'English I', icon:'📖', color:'#dbeafe', iconBg:'#2563eb',
    desc:'Reading, writing, speaking & listening', teks:'TEKS Chapter 110.38',

ear pairs are supplementary (180°-47°=133°). So: 133°, 133°, 47°", "_worksheet": "Geo A - WS 2: Logic & Constructions", "_topic": "Geo A - Worksheet 2: Logical Argument & Constructions"}, {"q": "Which congruence postulate proves triangles congruent given two sides and the included angle?", "opts": ["SSS", "ASA", "SAS", "AAS"], "ans": 2, "exp": "SAS: Side-Angle-Side requires the angle to be between the two sides", "_worksheet": "Geo A - WS 3: Triangle Congruence", "_topic": "Geo A - Worksheet 3: Proof & Congruence"}, {"q": "In triangle ABC, AB = 8, BC = 8, and AC = 10. What type of triangle is ABC?", "opts": ["Scalene", "Equilateral", "Isosceles", "Right"], "ans": 2, "exp": "Two sides equal (AB=BC=8) makes it isosceles", "_worksheet": "Geo A - WS 3: Triangle Congruence", "_topic": "Geo A - Worksheet 3: Proof & Congruence"}, {"q": "If triangle ABC ≅ triangle DEF by SAS, which angle must be congruent?", "opts": ["The angles opposite the congruent sides", "The angle between the two congruent sides", "All three angles", "Only the largest angle"], "ans": 1, "exp": "SAS requires the included angle (between the two sides) to be congruent", "_worksheet": "Geo A - WS 3: Triangle Congruence", "_topic": "Geo A - Worksheet 3: Proof & Congruence"}, {"q": "The base angles of isosceles triangle ABC are ∠B and ∠C. If ∠A = 50°, what is m∠B?", "opts": ["65°", "50°", "130°", "40°"], "ans": 0, "exp": "∠B + ∠C + ∠A = 180°. Since ∠B=∠C: 2∠B+50=180 → ∠B=65°", "_worksheet": "Geo A - WS 3: Triangle Congruence", "_topic": "Geo A - Worksheet 3: Proof & Congruence"}, {"q": "In right triangle ABC with right angle at C, AB = 13, BC = 5. What is AC?", "opts": ["8", "12", "√194", "11"], "ans": 1, "exp": "Pythagorean theorem: AC² + BC² = AB² → AC² = 169−25 = 144 → AC = 12", "_worksheet": "Geo A - WS 3: Triangle Congruence", "_topic": "Geo A - Worksheet 3: Proof & Congruence"}, {"q": "Two triangles have three pairs of congruent angles. Are they necessarily congruent?", "opts": ["Yes, by AAA", "No, they are similar but not necessarily congruent", "Yes, by ASA", "Only if they are right triangles"], "ans": 1, "exp": "AAA proves similarity, not congruence. Triangles with equal angles can be different sizes", "_worksheet": "Geo A - WS 3: Triangle Congruence", "_topic": "Geo A - Worksheet 3: Proof & Congruence"}, {"q": "Triangle PQR has PQ = QR and ∠P = 72°. What is m∠Q?", "opts": ["72°", "36°", "108°", "54°"], "ans": 1, "exp": "Isosceles: ∠P=∠R=72°. Then ∠Q = 180−72−72 = 36°", "_worksheet": "Geo A - WS 3: Triangle Congruence", "_topic": "Geo A - Worksheet 3: Proof & Congruence"}, {"q": "Which is NOT sufficient to prove two triangles congruent?", "opts": ["SSS", "SAS", "AAA", "AAS"], "ans": 2, "exp": "AAA proves similarity only, not congruence since the triangles could be different sizes", "_worksheet": "Geo A - WS 3: Triangle Congruence", "_topic": "Geo A - Worksheet 3: Proof & Congruence"}, {"q": "In a proof, after showing triangles ABC and DEF congruent by ASA, you can conclude:", "opts": ["Only the angles are equal", "AC ≅ DF by CPCTC", "The triangles are similar only", "Only the sides used in ASA are equal"], "ans": 1, "exp": "CPCTC: once triangles are proven congruent, all corresponding parts are congruent", "_worksheet": "Geo A - WS 3: Triangle Congruence", "_topic": "Geo A - Worksheet 3: Proof & Congruence"}, {"q": "The Hypotenuse-Leg theorem applies to:", "opts": ["Any two triangles", "Right triangles only", "Isosceles triangles only", "Equilateral triangles only"], "ans": 1, "exp": "HL theorem: if the hypotenuse and one leg of a right triangle are congruent to those of another right triangle, the triangles are congruent", "_worksheet": "Geo A - WS 3: Triangle Congruence", "_topic": "Geo A - Worksheet 3: Proof & Congruence"}, {"q": "An exterior angle of a triangle equals:", "opts": ["The sum of all interior angles", "The sum of the two non-adjacent interior angles", "The supplement of the adjacent interior angle only", "The difference of the two remote inter function mergePreloadedQuestions() {
  for (const [sid, qs] of Object.entries(PRELOADED_QUESTIONS)) {
    if (!BASE_QUESTIONS[sid]) BASE_QUESTIONS[sid] = [];
    const existing = new Set(BASE_QUESTIONS[sid].map(q => q.q));
    for (const q of qs) {
      if (!existing.has(q.q)) BASE_QUESTIONS[sid].push(q);
    }
  }
}

function renderSidebar() {
  const nav = state.role === 'admin' ? NAV_ADMIN : NAV_STUDENT;
  let html = '';
  nav.forEach(item => {
    if (item.section) html += `<div class="sb-section">${item.section}</div>`;
    else html += `<div class="sb-item ${state.page===item.id?'active':''}" onclick="navigate('${item.id}')">`
      + `<span class="sb-item-icon">${item.icon}</span>${item.label}</div>`;
  });
  document.getElementById('sidebarNav').innerHTML = html;
  document.getElementById('streakNum').textContent = state.streak + ' days';
  document.getElementById('xpBadge').textContent = '⭐ ' + state.xp + ' XP';
  document.getElementById('streakBadge').textContent = '🔥 ' + state.streak + 'd streak';
  document.getElementById('sidebarName').textContent = state.role === 'admin' ? 'Parent/Admin' : 'Nandini';
  document.getElementById('sidebarRole').textContent = state.role === 'admin' ? 'Administrator' : 'Grade 9 Student';
  document.getElementById('roleBtn').textContent = state.role === 'admin' ? 'Student' : 'Admin';
  document.getElementById('avatarInitials').textContent = state.role === 'admin' ? 'AD' : 'NG';
}

function switchRole() {
  state.role = state.role === 'admin' ? 'student' : 'admin';
  state.page = 'dashboard';
  renderSidebar(); renderPage();
}

function navigate(page) {
  state.page = page; state.selectedSubject = null; state.selectedUnit = null;
  renderSidebar(); renderPage();
  document.getElementById('main').scrollTop = 0;
}

function renderPage() {
  if (!state.loaded) {
    document.getElementById('content').innerHTML = '<div style="text-align:center;padding:60px"><div class="spinner"></div><p class="text-muted mt-16">Loading from Supabase...</p></div>';
    return;
  }
  const titles = {dashboard:'Dashboard',subjects:'Subjects & Curriculum',resources:'Resources',
    worksheets:'Worksheets',generate:'Generate Quiz',spaced:'Spaced Review',
    progress:'My Progress',history:'Quiz History',achievements:'Achievements',settings:'Settings'};
  document.getElementById('topbarTitle').textContent = titles[state.page] || 'Study Portal';
  const c = document.getElementById('content');
  const pages = {
    dashboard: renderDashboard, subjects: renderSubjects, resources: renderResources,
    worksheets: renderWorksheets, generate: renderGenerate, spaced: renderSpaced,
    progress: renderProgress, history: renderHistory, achievements: renderAchievements,
    settings: renderSettings
  };
  c.innerHTML = (pages[state.page] || renderDashboard)();
}

async function toggleTopic(key, sid) {
  state.completedTopics[key] = !state.completedTopics[key];
  if (state.completedTopics[key]) awardXP(10);
  checkAchievements();
  renderPage();
  await sbUpsertUnique('ng_progress', 'student_id,topic_key',
    { subject_id: sid, topic_key: key, completed: state.completedTopics[key], completed_at: new Date().toISOString() });
  await saveStats();
}

async function toggleResource(key, url) {
  if (!state.completedResources[key]) {
    state.completedResources[key] = true;
    awardXP(5);
    renderPage();
    await sbUpsertUnique('ng_resources', 'student_id,resource_key',
      { resource_key: key, reviewed: true, reviewed_at: new Date().toISOString() });
    await saveStats();
  }
  if (url && url !== '#') window.open(url, '_blank');
}

function launchSubject(id) { state.selectedSubject = id; navigate('subjects'); }

async function generateAIQuiz() {
  const subId = document.getElementById('genSubject').value;
  const topic = document.getElementById('genTopic').value || 'general topics';
  const diff = document.getElementById('genDiff').value;
  const count = parseInt(document.getElementById('genCount').value);
  const sub = SUBJECTS.find(s=>s.id===subId);
  const statusEl = document.getElementById('genStatus');

  statusEl.innerHTML = `<div class="card" style="text-align:center;padding:28px">
    <div class="spinner"></div>
    <p style="color:var(--muted);margin-top:8px;font-size:14px">Generating ${count} ${diff} questions on "${topic}" for ${sub.name}...</p>
  </div>`;

  const prompt = `You are a Texas TEKS Grade 9 teacher. Create exactly ${count} multiple-choice questions about "${topic}" for ${sub.name} (${sub.teks}).
Difficulty: ${diff === 'easy' ? 'foundational recall' : diff === 'medium' ? 'standard Grade 9 application' : 'STAAR-level critical thinking'}.
Respond ONLY with a valid JSON array, no markdown, no extra text:
[{"q":"question","opts":["A","B","C","D"],"ans":0,"exp":"explanation"}]
ans is the 0-based index of the correct answer. Make all options plausible.`;

  try {
    const resp = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'claude-sonnet-4-5', max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }] })
    });
    const data = await resp.json();
    // Handle both direct API response and proxy response formats
    if (!data.content) {
      throw new Error('API error: ' + JSON.stringify(data).substring(0,200));
    }
    let text = data.content.map(c=>c.text||'').join('');
    text = text.replace(/```json|```/g,'').trim();
    const questions = JSON.parse(text);

    // Save to question bank in Supabase
    for (const q of questions) {
      await sbInsert('ng_question_bank', {
        subject_id: subId, topic, question: q.q, options: q.opts,
        correct_index: q.ans, explanation: q.exp, difficulty: diff, generated: true
      });
      if (!state.questionBank[subId]) state.questionBank[subId] = [];
      state.questionBank[subId].push({ ...q, _topic: topic, _generated: true });
    }
    saveLocal();

    statusEl.innerHTML = `<div class="card" style="border-color:var(--green)">
      <p style="color:var(--green);font-weight:500;margin-bottom:12px">✓ Generated ${questions.length} questions and saved to your bank!</p>
      <button class="btn btn-primary" onclick="startCustomQuiz('${subId}',${count})">📝 Start This Quiz Now</button>
      <button class="btn btn-outline mt-8" onclick="navigate('worksheets')">View all worksheets</button>
    </div>`;
    window._lastGenQuestions = questions;
    window._lastGenSid = subId;
  } catch(e) {
    statusEl.innerHTML = `<div class="card" style="border-color:var(--red)">
      <p style="color:var(--red);font-size:14px">⚠️ Generation failed: ${e.message}</p>
      <p style="font-size:12px;color:var(--muted);margin-top:8px">The Anthropic API requires a valid API key with billing set up. This portal is using a proxy-free direct call.</p>
    </div>`;
  }
}

function startSubjectQuiz(sid) {
  const base = BASE_QUESTIONS[sid] || [];
  const extra = state.questionBank[sid] || [];
  const all = [...base, ...extra];
  if (!all.length) { alert('No questions yet! Generate some first.'); return; }
  const questions = shuffle(all).slice(0, Math.min(5, all.length));
  openQuiz(sid, SUBJECTS.find(s=>s.id===sid)?.name || sid, questions);
}

function startCustomQuiz(sid, count) {
  const qs = window._lastGenQuestions || [];
  openQuiz(sid, SUBJECTS.find(s=>s.id===sid)?.name || sid, qs.slice(0, count));
}

function openQuiz(sid, topic, questions) {
  state.activeQuiz = { sid, topic, questions, current: 0, answers: {} };
  showModal('Quiz: ' + topic, renderQuizQuestion());
}

function renderQuizQuestion() {
  const q = state.activeQuiz;
  if (!q) return '';
  const qi = q.current;
  const ques = q.questions[qi];
  const total = q.questions.length;
  const answered = q.answers[qi];
  return `<div>
    <div class="flex items-center justify-between mb-16">
      <span class="badge badge-accent">Question ${qi+1} of ${total}</span>
      <div class="prog-bar" style="width:120px"><div class="prog-fill" style="width:${Math.round((qi+1)/total*100)}%"></div></div>
    </div>
    <p class="quiz-q">${ques.q}</p>
    ${ques.opts.map((opt,i)=>{
      let cls='quiz-opt';
      if(answered!==undefined){
        if(i===ques.ans) cls+=' correct';
        else if(i===answered&&answered!==ques.ans) cls+=' wrong';
      } else if(i===answered) cls+=' selected';
      return `<div class="${cls}" onclick="${answered===undefined?`selectAnswer(${i})`:''}">
        <div class="quiz-letter">${['A','B','C','D'][i]}</div><span>${opt}</span></div>`;
    }).join('')}
    ${answered!==undefined?`<div class="card mt-12" style="background:var(--surface2);border:none">
      <p style="font-size:13px"><strong>${answered===ques.ans?'✓ Correct!':'✗ Incorrect.'}</strong> ${ques.exp}</p>
    </div>`:''}
    <div class="flex mt-16" style="justify-content:flex-end;gap:8px">
      ${answered!==undefined&&qi<total-1?`<button class="btn btn-primary" onclick="nextQuestion()">Next →</button>`:''}
      ${answered!==undefined&&qi===total-1?`<button class="btn btn-primary" onclick="finishQuiz()">See Results →</button>`:''}
    </div>
  </div>`;
}

function selectAnswer(i) {
  if (!state.activeQuiz || state.activeQuiz.answers[state.activeQuiz.current] !== undefined) return;
  state.activeQuiz.answers[state.activeQuiz.current] = i;
  document.getElementById('modalBody').innerHTML = renderQuizQuestion();
}

function nextQuestion() { state.activeQuiz.current++; document.getElementById('modalBody').innerHTML = renderQuizQuestion(); }

async function finishQuiz() {
  const q = state.activeQuiz;
  const correct = Object.keys(q.answers).filter(i=>q.answers[i]===q.questions[i].ans).length;
  const total = q.questions.length;
  const pct = Math.round(correct/total*100);
  const xpGain = pct>=80?30:pct>=60?20:10;

  const entry = { sid:q.sid, topic:q.topic, correct, total, pct,
    date: new Date().toLocaleDateString(), ts: Date.now() };
  state.quizHistory.push(entry);
  awardXP(xpGain);

  // Spaced repetition -- schedule wrong answers
  for (const [i, ques] of q.questions.entries()) {
    if (q.answers[i] !== ques.ans) {
      const dueAt = new Date(Date.now() + 86400000 * 2).toISOString();
      const { data } = await sb.from('ng_spaced_review').insert({
        student_id: STUDENT_ID, subject_id: q.sid, topic: q.topic,
        question_data: ques, due_at: dueAt
      }).select();
      if (data?.[0]) {
        state.spaceRepeat[data[0].id] = {
          id: data[0].id, sid: q.sid, topic: q.topic, ques, due: new Date(dueAt).getTime()
        };
      }
    }
  }

  // Save quiz to Supabase
  await sbInsert('ng_quiz_history', {
    subject_id: q.sid, topic: q.topic, correct, total, pct,
    quiz_date: new Date().toISOString().split('T')[0]
  });
  checkAchievements();
  await saveStats();
  saveLocal();

  const color = pct>=80?'var(--green)':pct>=60?'var(--amber)':'var(--red)';
  const msg = pct>=80?'Excellent work! 🎉':pct>=60?'Good effort! Keep practicing 💪':'Keep reviewing -- you\'ve got this! 📚';

  document.getElementById('modalBody').innerHTML = `
    <div style="text-align:center;padding:20px 0">
      <div class="score-ring" style="border-color:${color}">
        <div class="score-pct" style="color:${color}">${pct}%</div>
        <div style="font-size:11px;color:var(--muted)">${correct}/${total}</div>
      </div>
      <h3 style="font-size:18px;margin-bottom:6px">${msg}</h3>
      <p class="text-muted text-sm">+${xpGain} XP  -  Saved to Supabase ☁️</p>
      <div class="flex mt-20" style="justify-content:center;gap:10px">
        <button class="btn btn-outline" onclick="closeModal();renderPage()">Close</button>
        <button class="btn btn-primary" onclick="closeModal();navigate('generate')">✨ Generate more</button>
      </div>
    </div>
    <div style="margin-top:20px">
      <h3 style="font-size:14px;font-weight:600;margin-bottom:12px">Answer Review</h3>
      ${q.questions.map((ques,i)=>`
        <div style="padding:12px;border-left:3px solid ${q.answers[i]===ques.ans?'var(--green)':'var(--red)'};
          background:${q.answers[i]===ques.ans?'var(--green-soft)':'var(--red-soft)'};border-radius:0 8px 8px 0;margin-bottom:8px">
          <p style="font-size:13px;font-weight:500">${ques.q}</p>
          <p style="font-size:12px;color:var(--muted);margin-top:4px">Your answer: ${ques.opts[q.answers[i]]||'--'} ${q.answers[i]===ques.ans?'✓':'✗'}</p>
          ${q.answers[i]!==ques.ans?`<p style="font-size:12px;color:var(--green);margin-top:2px">Correct: ${ques.opts[ques.ans]}</p>`:''}
          <p style="font-size:12px;color:#555;margin-top:4px">${ques.exp}</p>
        </div>`).join('')}
    </div>`;
}

function awardXP(amount) { state.xp += amount; renderSidebar(); }
function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
