<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Nandini's Study Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --ink: #1a1a2e; --ink2: #2d2d4a; --muted: #6b6b8a; --soft: #9898b0;
  --border: rgba(100,100,160,0.15); --border2: rgba(100,100,160,0.28);
  --bg: #f7f6ff; --surface: #ffffff; --surface2: #f0effe;
  --accent: #5b4cf5; --accent2: #7c6ff7; --accent-soft: #ede9ff;
  --green: #16a34a; --green-soft: #dcfce7;
  --amber: #d97706; --amber-soft: #fef3c7;
  --red: #dc2626; --red-soft: #fee2e2;
  --blue: #2563eb; --blue-soft: #dbeafe;
  --teal: #0d9488; --teal-soft: #ccfbf1;
  --r: 10px; --r2: 16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
h1,h2,h3{font-family:'Playfair Display',serif}
#app{display:flex;min-height:100vh}
#sidebar{width:240px;min-height:100vh;background:var(--ink);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;flex-shrink:0}
#main{flex:1;overflow-x:hidden;overflow-y:auto;height:100vh}
.sb-header{padding:24px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.08)}
.sb-logo{font-family:'Playfair Display',serif;font-size:18px;color:#fff;font-weight:700;line-height:1.2}
.sb-sub{font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:0.5px;text-transform:uppercase;margin-top:2px}
.sb-streak{display:flex;align-items:center;gap:6px;margin-top:12px;background:rgba(255,255,255,0.06);border-radius:8px;padding:8px 10px}
.sb-streak-num{font-weight:600;color:#fbbf24;font-size:14px}
.sb-nav{padding:12px 0;flex:1}
.sb-section{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1px;text-transform:uppercase;padding:12px 20px 6px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;transition:background 0.15s;color:rgba(255,255,255,0.65);font-size:13.5px}
.sb-item:hover{background:rgba(255,255,255,0.07);color:#fff}
